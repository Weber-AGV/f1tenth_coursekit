<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="480" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">localize_launch.py — What Gets Launched</text>
  <text x="390" y="46" text-anchor="middle" font-size="10" fill="#64748b">Three nodes started by a single launch command</text>

  <!-- Launch command -->
  <rect x="200" y="58" width="380" height="28" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="390" y="76" text-anchor="middle" font-size="10" font-family="monospace" fill="#334155">ros2 launch particle_filter localize_launch.py</text>

  <!-- ===== NODE 1: Lifecycle Manager ===== -->
  <rect x="30" y="110" width="220" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" font-size="9" fill="#92400e">① Starts first</text>
  <text x="140" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Lifecycle Manager</text>
  <text x="140" y="166" text-anchor="middle" font-size="9" fill="#78716c">nav2_lifecycle_manager</text>
  <text x="140" y="182" text-anchor="middle" font-size="9" fill="#78716c">Manages map_server startup</text>
  <text x="140" y="197" text-anchor="middle" font-size="9" fill="#78716c">autostart: True</text>

  <!-- ===== NODE 2: Map Server ===== -->
  <rect x="280" y="110" width="220" height="100" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="390" y="130" text-anchor="middle" font-size="9" fill="#1e40af">② Starts second</text>
  <text x="390" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Map Server</text>
  <text x="390" y="166" text-anchor="middle" font-size="9" fill="#78716c">nav2_map_server</text>
  <text x="390" y="182" text-anchor="middle" font-size="9" fill="#78716c">Loads .pgm + .yaml map files</text>
  <text x="390" y="197" text-anchor="middle" font-size="9" fill="#78716c">Publishes on /map</text>

  <!-- ===== NODE 3: Particle Filter ===== -->
  <rect x="530" y="110" width="220" height="100" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" font-size="9" fill="#15803d">③ Starts last</text>
  <text x="640" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Particle Filter</text>
  <text x="640" y="166" text-anchor="middle" font-size="9" fill="#78716c">particle_filter</text>
  <text x="640" y="182" text-anchor="middle" font-size="9" fill="#78716c">MCL localization</text>
  <text x="640" y="197" text-anchor="middle" font-size="9" fill="#78716c">Params from localize.yaml</text>

  <!-- Arrow: Lifecycle Manager → Map Server (manages) -->
  <line x1="250" y1="155" x2="277" y2="155" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="263" y="148" text-anchor="middle" font-size="8" fill="#d97706">activates</text>

  <!-- Arrow: Map Server → Particle Filter (/map service) -->
  <line x1="500" y1="155" x2="527" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="513" y="148" text-anchor="middle" font-size="8" fill="#2563eb">/map</text>

  <!-- ===== LIFECYCLE STATES ===== -->
  <rect x="30" y="240" width="220" height="75" rx="8" fill="#fff" stroke="#d97706" stroke-width="1"/>
  <text x="140" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Lifecycle Transitions</text>
  <text x="140" y="275" text-anchor="middle" font-size="9" fill="#78716c">Unconfigured → configure → Inactive</text>
  <text x="140" y="290" text-anchor="middle" font-size="9" fill="#78716c">Inactive → activate → Active</text>
  <text x="140" y="305" text-anchor="middle" font-size="9" fill="#78716c">(then map_server starts publishing)</text>
  <line x1="140" y1="210" x2="140" y2="237" stroke="#d97706" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== MAP FILES ===== -->
  <rect x="280" y="240" width="220" height="60" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1"/>
  <text x="390" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Map Files</text>
  <text x="390" y="275" text-anchor="middle" font-size="9" fill="#78716c">particle_filter/maps/lab_map_clean.yaml</text>
  <text x="390" y="290" text-anchor="middle" font-size="9" fill="#78716c">particle_filter/maps/lab_map_clean.pgm</text>
  <line x1="390" y1="210" x2="390" y2="237" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== PARTICLE FILTER DETAILS ===== -->
  <rect x="530" y="240" width="220" height="75" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1"/>
  <text x="640" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">At Startup</text>
  <text x="640" y="275" text-anchor="middle" font-size="9" fill="#78716c">get_omap() — fetch map via service</text>
  <text x="640" y="290" text-anchor="middle" font-size="9" fill="#78716c">Load into RangeLibc</text>
  <text x="640" y="305" text-anchor="middle" font-size="9" fill="#78716c">Precompute sensor model table</text>
  <line x1="640" y1="210" x2="640" y2="237" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== EXTERNAL CONNECTIONS ===== -->
  <text x="390" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#64748b">External Connections</text>

  <!-- Inputs to Particle Filter -->
  <rect x="30" y="360" width="140" height="35" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="100" y="376" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">/scan (LiDAR)</text>
  <text x="100" y="389" text-anchor="middle" font-size="8" fill="#3b82f6">from hardware driver</text>

  <rect x="190" y="360" width="140" height="35" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="260" y="376" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">/vesc/odom</text>
  <text x="260" y="389" text-anchor="middle" font-size="8" fill="#3b82f6">from VESC driver</text>

  <rect x="350" y="360" width="140" height="35" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="420" y="376" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">/initialpose</text>
  <text x="420" y="389" text-anchor="middle" font-size="8" fill="#b45309">from RViz2 (one-time)</text>

  <!-- Outputs from Particle Filter -->
  <rect x="510" y="360" width="120" height="35" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="376" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">/pf/pose/odom</text>
  <text x="570" y="389" text-anchor="middle" font-size="8" fill="#7c3aed">localized pose</text>

  <rect x="650" y="360" width="120" height="35" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="710" y="376" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">TF: map→laser</text>
  <text x="710" y="389" text-anchor="middle" font-size="8" fill="#7c3aed">+ viz topics</text>

  <!-- Input arrows: route below everything, up the far right, enter PF from top -->
  <path d="M 100,395 L 100,440 L 760,440 L 760,100 L 750,100 L 750,108" fill="none" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 260,395 L 260,446 L 766,446 L 766,100 L 740,100 L 740,108" fill="none" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 420,395 L 420,452 L 772,452 L 772,100 L 730,100 L 730,108" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Output arrows: straight down from PF At Startup box to output boxes -->
  <line x1="570" y1="315" x2="570" y2="358" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="710" y1="315" x2="710" y2="358" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Config file -->
  <rect x="280" y="415" width="220" height="35" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="390" y="432" text-anchor="middle" font-size="9" font-weight="bold" fill="#334155">localize.yaml</text>
  <text x="390" y="444" text-anchor="middle" font-size="8" fill="#78716c">Config for all params (shared by launch + PF node)</text>

  <!-- Legend -->
  <rect x="40" y="462" width="12" height="10" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="58" y="471" font-size="9" fill="#64748b">Input</text>

  <rect x="120" y="462" width="12" height="10" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="138" y="471" font-size="9" fill="#64748b">Output</text>

  <rect x="200" y="462" width="12" height="10" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="218" y="471" font-size="9" fill="#64748b">Lifecycle / one-time</text>

  <rect x="340" y="462" width="12" height="10" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="358" y="471" font-size="9" fill="#64748b">Particle Filter node</text>
</svg>
