<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="340" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">How the Particle Filter Works</text>

  <!-- MCL cycle box -->
  <rect x="40" y="45" width="310" height="240" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="195" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">MCL Cycle (repeats ~30-40 Hz)</text>

  <!-- Step 1: Predict (top-left) -->
  <rect x="60" y="82" width="120" height="55" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="120" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">1. Predict</text>
  <text x="120" y="120" text-anchor="middle" font-size="9" fill="#78716c">Move particles using</text>
  <text x="120" y="131" text-anchor="middle" font-size="9" fill="#78716c">odometry + noise</text>

  <!-- Step 2: Weight (top-right) -->
  <rect x="210" y="82" width="120" height="55" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  <text x="270" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">2. Weight</text>
  <text x="270" y="120" text-anchor="middle" font-size="9" fill="#78716c">Score each particle</text>
  <text x="270" y="131" text-anchor="middle" font-size="9" fill="#78716c">vs real LiDAR scan</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="109" x2="207" y2="109" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Resample (bottom-right) -->
  <rect x="210" y="162" width="120" height="55" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="270" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">3. Resample</text>
  <text x="270" y="200" text-anchor="middle" font-size="9" fill="#78716c">Keep good particles</text>
  <text x="270" y="211" text-anchor="middle" font-size="9" fill="#78716c">discard bad ones</text>

  <!-- Arrow 2→3 -->
  <line x1="270" y1="137" x2="270" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Publish (bottom-left) -->
  <rect x="60" y="162" width="120" height="55" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="120" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">4. Publish</text>
  <text x="120" y="200" text-anchor="middle" font-size="9" fill="#78716c">Weighted average</text>
  <text x="120" y="211" text-anchor="middle" font-size="9" fill="#78716c">= best pose</text>

  <!-- Arrow 3→4 -->
  <line x1="207" y1="189" x2="183" y2="189" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Loop arrow 4→1 -->
  <path d="M 60,189 Q 45,189 45,145 Q 45,109 58,109" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="32" y="150" text-anchor="middle" font-size="8" fill="#555" transform="rotate(-90,32,150)">loop</text>

  <!-- Output: /pf/pose/odom -->
  <rect x="385" y="100" width="100" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="435" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Pose</text>
  <text x="435" y="131" text-anchor="middle" font-size="8" fill="#16a34a">/pf/pose/odom</text>

  <!-- Output: TF -->
  <rect x="385" y="155" width="100" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="435" y="173" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">TF</text>
  <text x="435" y="186" text-anchor="middle" font-size="8" fill="#16a34a">map → laser</text>

  <!-- Output arrows from Publish -->
  <path d="M 180,195 L 355,195 L 355,120 L 383,120" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 355,175 L 383,175" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <circle cx="355" cy="175" r="2.5" fill="#16a34a"/>

  <!-- Subtitle -->
  <text x="195" y="255" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">4000 particles × [x, y, θ] updated every cycle</text>

  <!-- Footer -->
  <text x="250" y="310" text-anchor="middle" font-size="9" fill="#94a3b8">See "Understanding the Particle Filter Code" for the full diagram</text>
  <text x="250" y="325" text-anchor="middle" font-size="9" fill="#94a3b8">with inputs, RangeLibc, and all output topics</text>
</svg>
